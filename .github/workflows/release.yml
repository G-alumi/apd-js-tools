name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm pack

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
